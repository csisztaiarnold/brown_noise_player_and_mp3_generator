<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brown Noise Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1008;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #d4a96a;
      padding: 24px 0;
    }

    .card {
      background: #241508;
      border-radius: 24px;
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
      width: min(440px, 100vw - 32px);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #e8c090;
    }

    .waveform {
      display: flex;
      align-items: center;
      gap: 5px;
      height: 48px;
    }

    .waveform .bar {
      width: 5px;
      border-radius: 3px;
      background: #a0622a;
      animation: wave 1.2s ease-in-out infinite;
      transform-origin: bottom;
    }

    .waveform.paused .bar {
      animation-play-state: paused;
      height: 6px !important;
    }

    .waveform .bar:nth-child(1)  { animation-delay: 0.0s; }
    .waveform .bar:nth-child(2)  { animation-delay: 0.1s; }
    .waveform .bar:nth-child(3)  { animation-delay: 0.2s; }
    .waveform .bar:nth-child(4)  { animation-delay: 0.3s; }
    .waveform .bar:nth-child(5)  { animation-delay: 0.4s; }
    .waveform .bar:nth-child(6)  { animation-delay: 0.3s; }
    .waveform .bar:nth-child(7)  { animation-delay: 0.2s; }
    .waveform .bar:nth-child(8)  { animation-delay: 0.1s; }
    .waveform .bar:nth-child(9)  { animation-delay: 0.0s; }

    @keyframes wave {
      0%, 100% { height: 8px; }
      50%       { height: 40px; }
    }

    .play-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid #a0622a;
      background: #3a1a08;
      color: #e8c090;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      outline: none;
    }

    .play-btn:hover {
      background: #5c3010;
      transform: scale(1.05);
    }

    .play-btn:active {
      transform: scale(0.97);
    }

    .play-btn svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }

    .volume-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .volume-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #a07040;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #3a1a08;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #c07832;
      border: 2px solid #e8c090;
      cursor: pointer;
      transition: background 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #e8a050;
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #c07832;
      border: 2px solid #e8c090;
      cursor: pointer;
    }

    .hint {
      font-size: 0.75rem;
      color: #6a4020;
      text-align: center;
    }

    .divider {
      width: 100%;
      border: none;
      border-top: 1px solid #3a1a08;
    }

    .export-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .export-label {
      font-size: 0.85rem;
      color: #a07040;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .duration-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .duration-row input[type="number"] {
      flex: 1;
      background: #3a1a08;
      border: 1px solid #5c3010;
      border-radius: 8px;
      color: #e8c090;
      font-size: 0.95rem;
      padding: 8px 12px;
      outline: none;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .duration-row input[type="number"]::-webkit-inner-spin-button,
    .duration-row input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .gen-btn {
      background: #5c3010;
      border: 1px solid #a0622a;
      border-radius: 8px;
      color: #e8c090;
      font-size: 0.9rem;
      padding: 8px 18px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .gen-btn:hover:not(:disabled) {
      background: #7a4018;
    }

    .gen-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .progress-wrap {
      display: none;
      flex-direction: column;
      gap: 6px;
    }

    .progress-wrap.visible {
      display: flex;
    }

    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: #3a1a08;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: #c07832;
      border-radius: 3px;
      transition: width 0.1s linear;
    }

    .progress-text {
      font-size: 0.75rem;
      color: #a07040;
      text-align: right;
    }

    .cancel-btn {
      background: transparent;
      border: 1px solid #5c3010;
      border-radius: 8px;
      color: #a07040;
      font-size: 0.8rem;
      padding: 4px 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .cancel-btn:hover {
      border-color: #c07832;
      color: #e8c090;
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 24px;
        gap: 24px;
        border-radius: 16px;
      }

      h1 {
        font-size: 1.4rem;
      }

      .play-btn {
        width: 60px;
        height: 60px;
      }

      .duration-row {
        flex-wrap: wrap;
      }

      .gen-btn {
        width: 100%;
        text-align: center;
      }
    }

    .card-links {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(440px, 100vw - 32px);
      margin-top: 12px;
      padding: 0 4px;
    }

    .card-links a {
      color: #6a4020;
      text-decoration: none;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .card-links a:hover {
      color: #a07040;
    }

    .card-links svg {
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Brown Noise Player</h1>

    <div class="waveform paused" id="waveform">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <button class="play-btn" id="playBtn" aria-label="Play">
      <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>

    <div class="volume-section">
      <div class="volume-label">
        <span>Volume</span>
        <span id="volDisplay">70%</span>
      </div>
      <input type="range" id="volumeSlider" min="0" max="100" value="90" />
    </div>

    <div class="volume-section">
      <div class="volume-label">
        <span>Deepness</span>
        <span id="deepDisplay">40%</span>
      </div>
      <input type="range" id="deepnessSlider" min="0" max="100" value="70" />
    </div>

    <p class="hint">Click play to start</p>

    <hr class="divider" />

    <div class="export-section">
      <div class="export-label">
        <span>Export MP3</span>
        <span style="color:#6a4020;font-size:0.75rem">320 kbps · stereo</span>
      </div>
      <div class="duration-row">
        <input type="number" id="durationInput" min="1" max="480" value="10" />
        <span style="color:#6a4020;font-size:0.85rem">minutes</span>
        <button class="gen-btn" id="genBtn">Generate &amp; Download</button>
      </div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <button class="cancel-btn" id="cancelBtn">Cancel</button>
          <div class="progress-text" id="progressText">0%</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card-links">
    <a href="https://health.clevelandclinic.org/brown-noise" target="_blank" rel="noopener">What is Brown Noise?</a>
    <a href="https://github.com/csisztaiarnold/brown_noise_player_and_mp3_generator" target="_blank" rel="noopener" aria-label="GitHub">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
    </a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
  <script>
    let audioCtx    = null;
    let gainNode    = null;
    let processor   = null;
    let isPlaying   = false;
    const layers = [
      { last: 0, coeff: 0.020 },  // standard brown
      { last: 0, coeff: 0.010 },  // deeper
      { last: 0, coeff: 0.006 },  // very deep rumble
      { last: 0, coeff: 0.003 },  // sub-bass foundation
    ];

    const playBtn      = document.getElementById('playBtn');
    const iconPlay     = document.getElementById('iconPlay');
    const iconPause    = document.getElementById('iconPause');
    const volumeSlider = document.getElementById('volumeSlider');
    const volDisplay   = document.getElementById('volDisplay');
    const deepnessSlider = document.getElementById('deepnessSlider');
    const deepDisplay    = document.getElementById('deepDisplay');
    const waveform     = document.getElementById('waveform');

    volumeSlider.value   = localStorage.getItem('bnVolume')   ?? 90;
    deepnessSlider.value = localStorage.getItem('bnDeepness') ?? 70;
    volDisplay.textContent  = volumeSlider.value + '%';
    deepDisplay.textContent = deepnessSlider.value + '%';

    const BASE_COEFFS = [0.020, 0.010, 0.006, 0.003];

    function coeffScale() {
      return Math.pow(10, (50 - deepnessSlider.value) / 50);
    }

    function applyDeepness() {
      const s = coeffScale();
      layers.forEach((l, i) => { l.coeff = BASE_COEFFS[i] * s; });
    }

    function buildGraph() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      applyDeepness();

      processor = audioCtx.createScriptProcessor(4096, 0, 1);
      processor.onaudioprocess = (e) => {
        const out = e.outputBuffer.getChannelData(0);
        for (let i = 0; i < out.length; i++) {
          let sample = 0;
          for (const l of layers) {
            const w = Math.random() * 2 - 1;
            l.last = (l.last + l.coeff * w) / (1 + l.coeff);
            sample += l.last;
          }
          out[i] = sample * 1.0;
        }
      };

      const lpf = audioCtx.createBiquadFilter();
      lpf.type            = 'lowpass';
      lpf.frequency.value = 600;
      lpf.Q.value         = 0.5;

      const comp = audioCtx.createDynamicsCompressor();
      comp.threshold.value = -6;
      comp.knee.value      = 3;
      comp.ratio.value     = 20;
      comp.attack.value    = 0.003;
      comp.release.value   = 0.25;

      gainNode = audioCtx.createGain();
      gainNode.gain.value = (volumeSlider.value / 100) * 4.0;

      processor.connect(lpf);
      lpf.connect(comp);
      comp.connect(gainNode);
      gainNode.connect(audioCtx.destination);
    }

    function startNoise() {
      if (!audioCtx) buildGraph();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function stopNoise() {
      if (audioCtx) audioCtx.suspend();
    }

    playBtn.addEventListener('click', () => {
      if (isPlaying) {
        stopNoise();
        iconPlay.style.display  = '';
        iconPause.style.display = 'none';
        waveform.classList.add('paused');
        isPlaying = false;
      } else {
        startNoise();
        iconPlay.style.display  = 'none';
        iconPause.style.display = '';
        waveform.classList.remove('paused');
        isPlaying = true;
      }
    });

    volumeSlider.addEventListener('input', () => {
      const vol = volumeSlider.value;
      volDisplay.textContent = vol + '%';
      localStorage.setItem('bnVolume', vol);
      if (gainNode) {
        gainNode.gain.setTargetAtTime((vol / 100) * 4.0, audioCtx.currentTime, 0.01);
      }
    });

    deepnessSlider.addEventListener('input', () => {
      deepDisplay.textContent = deepnessSlider.value + '%';
      localStorage.setItem('bnDeepness', deepnessSlider.value);
      applyDeepness();
    });

    // ── MP3 Export ────────────────────────────────────────────────────────────
    const genBtn       = document.getElementById('genBtn');
    const durationInput= document.getElementById('durationInput');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const cancelBtn    = document.getElementById('cancelBtn');

    let cancelRequested = false;

    cancelBtn.addEventListener('click', () => { cancelRequested = true; });

    function makeLPF(fc, sampleRate, Q) {
      const w0 = 2 * Math.PI * fc / sampleRate;
      const cosw = Math.cos(w0), sinw = Math.sin(w0);
      const alpha = sinw / (2 * Q);
      return {
        b0: (1 - cosw) / 2,  b1: 1 - cosw,  b2: (1 - cosw) / 2,
        a0: 1 + alpha,       a1: -2 * cosw,  a2: 1 - alpha,
        x1: 0, x2: 0, y1: 0, y2: 0
      };
    }

    function applyBiquad(f, x) {
      const y = (f.b0/f.a0)*x + (f.b1/f.a0)*f.x1 + (f.b2/f.a0)*f.x2
                              - (f.a1/f.a0)*f.y1 - (f.a2/f.a0)*f.y2;
      f.x2 = f.x1; f.x1 = x;
      f.y2 = f.y1; f.y1 = y;
      return y;
    }

    async function generateAndDownload() {
      const minutes = Math.max(1, Math.min(480, Number(durationInput.value) || 10));
      const sampleRate   = 44100;
      const totalSamples = sampleRate * minutes * 60;
      const CHUNK        = sampleRate * 2;

      genBtn.disabled = true;
      cancelRequested = false;
      progressWrap.classList.add('visible');
      progressFill.style.width = '0%';
      progressText.textContent  = 'Starting…';

      const s = coeffScale();
      const genLayers = BASE_COEFFS.map(c => ({ last: 0, coeff: c * s }));

      const lpf = makeLPF(600, sampleRate, 0.5);

      const encoder = new lamejs.Mp3Encoder(2, sampleRate, 320);
      const mp3Chunks = [];

      let processed = 0;
      while (processed < totalSamples) {
        const count = Math.min(CHUNK, totalSamples - processed);
        const pcmL  = new Int16Array(count);
        const pcmR  = new Int16Array(count);

        for (let i = 0; i < count; i++) {
          let s = 0;
          for (const l of genLayers) {
            const w = Math.random() * 2 - 1;
            l.last = (l.last + l.coeff * w) / (1 + l.coeff);
            s += l.last;
          }
          s = applyBiquad(lpf, s * 1.0);
          const sample = Math.max(-32768, Math.min(32767, s * 26000));
          pcmL[i] = sample;
          pcmR[i] = sample;
        }

        const chunk = encoder.encodeBuffer(pcmL, pcmR);
        if (chunk.length > 0) mp3Chunks.push(new Uint8Array(chunk));

        processed += count;
        const pct = Math.round(processed / totalSamples * 100);
        progressFill.style.width  = pct + '%';
        progressText.textContent  = pct + '%  —  rendering…';

        await new Promise(r => setTimeout(r, 0));

        if (cancelRequested) {
          progressFill.style.width = '0%';
          progressText.textContent = 'Cancelled.';
          genBtn.disabled = false;
          return;
        }
      }

      const tail = encoder.flush();
      if (tail.length > 0) mp3Chunks.push(new Uint8Array(tail));

      const blob = new Blob(mp3Chunks, { type: 'audio/mpeg' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `brown-noise-${minutes}min.mp3`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 10000);

      progressText.textContent = 'Done!';
      genBtn.disabled = false;
    }

    genBtn.addEventListener('click', generateAndDownload);
  </script>
</body>
</html>
